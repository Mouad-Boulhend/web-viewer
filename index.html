<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Preview</title>
    <style>
        body { margin: 0; background-color: #f0f0f0; }
        model-viewer {
            width: 100vw;
            height: 100vh;
            --poster-color: transparent;
        }
    </style>
</head>
<body>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <model-viewer 
        src="human.glb" 
        ar 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1" 
        auto-rotate>
    </model-viewer>

</body>
</html>
